services:
  db:
    image: postgres:16
    container_name: webhook-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webhook-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: webhook-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - webhook-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: webhook-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webhook
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecretkeychangeinproduction
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - webhook-network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_output:/app/output

  frontend:
    build: ./frontend
    container_name: webhook-frontend
    restart: always
    ports:
      - "5500:5500"
    depends_on:
      - backend
    networks:
      - webhook-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

  worker:
    build: ./backend
    container_name: webhook-worker
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webhook
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecretkeychangeinproduction
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - webhook-network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_output:/app/output
    command: ["npm", "run", "worker"]

volumes:
  postgres_data:
  backend_output:

networks:
  webhook-network:
    driver: bridge