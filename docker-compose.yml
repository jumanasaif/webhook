services:
  db:
    image: postgres:16
    container_name: webhook-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: webhook-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: